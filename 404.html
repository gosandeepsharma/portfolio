<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found — Sandeep Sharma</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0B1413" media="(prefers-color-scheme: dark)" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<script>(function(){try{var t=localStorage.getItem('theme');if(!t){t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600&family=IBM+Plex+Sans:wght@400&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#FFFFFF; --text:#12211F; --text-soft:#64726F; --border:#E4E9E7;
  --accent:#0E9E92; --link:#08726A; --accent-soft:#D6F2EE; --on-accent:#FFFFFF;
  --dot:rgba(14,158,146,.20);
}
:root[data-theme="dark"] {
  --bg:#0B1413; --text:#E8F1EF; --text-soft:#8AA09B; --border:#1E322F;
  --accent:#2DD4BF; --link:#2DD4BF; --accent-soft:#133330; --on-accent:#0B1413;
  --dot:rgba(45,212,191,.12);
}
* { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px; text-align: center; padding: 32px;
  background-color: var(--bg);
  background-image: radial-gradient(var(--dot) 1px, transparent 1.4px);
  background-size: 24px 24px;
  color: var(--text);
  font-family: "IBM Plex Sans", Arial, sans-serif;
}
.code { font-family: "IBM Plex Mono", monospace; font-size: 13px; letter-spacing: .2em; color: var(--link); text-transform: uppercase; }
h1 { font-family: "DIN Next W1G", "Archivo", sans-serif; font-weight: 600; font-size: clamp(28px, 5vw, 40px); margin: 0; }
p { color: var(--text-soft); max-width: 34rem; margin: 0; line-height: 1.6; }
a.btn {
  font-family: "DIN Next W1G", "Archivo", sans-serif; font-weight: 600; font-size: 14px;
  letter-spacing: .04em; color: var(--on-accent); background: var(--link);
  border: 1px solid var(--link); border-radius: 10px; padding: 13px 22px; text-decoration: none;
}
</style>
</head>
<body>
<div class="code">404 — Not found</div>
<h1>This page wandered off.</h1>
<p>Probably chasing a question it couldn't stop thinking about. The homepage has everything that's actually here.</p>
<a class="btn" href="/">Back to the homepage</a>
</body>
</html>
