<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Writings — Sandeep Sharma</title>
<meta name="description" content="Essays, notes, and the occasional talk by Sandeep Sharma." />

<link rel="canonical" href="https://gosandeep.com/writings" />
<meta property="og:title" content="My Writings — Sandeep Sharma" />
<meta property="og:description" content="Essays, notes, and the occasional talk." />
<meta property="og:url" content="https://gosandeep.com/writings" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Sandeep Sharma" />
<meta name="twitter:card" content="summary" />
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0B1413" media="(prefers-color-scheme: dark)" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<!-- Set theme before paint to avoid flash -->
<script>(function(){try{var t=localStorage.getItem('theme');if(!t){t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   1. DESIGN TOKENS
   ============================================================ */
:root {
  --bg:          #FFFFFF;
  --surface:     #FFFFFF;
  --text:        #12211F;
  --text-soft:   #64726F;
  --border:      #E4E9E7;
  --accent:      #0E9E92;
  --link:        #08726A;
  --accent-soft: #D6F2EE;
  --on-accent:   #FFFFFF;
  --dot:         rgba(14,158,146,.20);

  --font-body: "IBM Plex Sans", Arial, sans-serif;
  --font-head: "DIN Next W1G", "DIN Next", "Archivo", sans-serif;
  --font-mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;

  --radius: 10px;
  --ease: cubic-bezier(.22,.61,.36,1);
}
:root[data-theme="dark"] {
  --bg:          #0B1413;
  --surface:     #10201E;
  --text:        #E8F1EF;
  --text-soft:   #8AA09B;
  --border:      #1E322F;
  --accent:      #2DD4BF;
  --link:        #2DD4BF;
  --accent-soft: #133330;
  --on-accent:   #0B1413;
  --dot:         rgba(45,212,191,.12);
}

/* ============================================================
   2. BASE
   ============================================================ */
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background-color: var(--bg);
  background-image: radial-gradient(var(--dot) 1px, transparent 1.4px);
  background-size: 24px 24px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
body * {
  transition: background-color .3s ease, border-color .3s ease,
              color .3s ease, box-shadow .2s ease;
}
a { color: var(--link); }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

.skip-link {
  position: absolute; left: -9999px; top: 0;
  background: var(--surface); color: var(--link);
  padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px;
  font-family: var(--font-mono); font-size: 13px; z-index: 100;
}
.skip-link:focus { left: 12px; top: 12px; }

.wrap { max-width: 1128px; margin-inline: auto; padding-inline: 32px; }

@keyframes glowdrift {
  0%   { transform: translate(-6%,-4%) scale(1); }
  50%  { transform: translate(6%,5%)  scale(1.14); }
  100% { transform: translate(-6%,-4%) scale(1); }
}
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  .glow { animation: none !important; }
  body * { transition: none !important; }
}

/* ============================================================
   3. TOP BAR
   ============================================================ */
.topbar { border-bottom: 1px solid var(--border); background: color-mix(in srgb, var(--bg) 88%, transparent); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(6px); }
.topbar-inner {
  max-width: 1192px; margin-inline: auto;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  padding: 20px 32px;
}
.wordmark {
  font-family: var(--font-head); font-weight: 600; font-size: 20px;
  letter-spacing: .02em; color: var(--text); text-decoration: none;
}
.nav { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
.nav a {
  font-family: var(--font-mono); font-size: 12.5px; letter-spacing: .15em;
  text-transform: uppercase; color: var(--text-soft); text-decoration: none;
}
.nav a:hover { color: var(--link); }
.nav a[aria-current="page"] {
  color: var(--link);
  border-bottom: 1.5px solid var(--accent); padding-bottom: 2px;
}
.nav-divider { width: 1px; height: 18px; background: var(--border); }
.theme-toggle {
  font-family: var(--font-mono); font-size: 12px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text);
  background: transparent; border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 13px; cursor: pointer;
}
.theme-toggle:hover { border-color: var(--link); color: var(--link); }

/* ============================================================
   4. PAGE HEADER
   ============================================================ */
.page-head {
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: 36px 32px 28px;
}
.glow {
  position: absolute; left: 50%; top: 24px;
  width: 520px; height: 320px; margin-left: -260px;
  background: radial-gradient(circle at 50% 40%, var(--accent-soft), transparent 66%);
  opacity: .6; filter: blur(16px); pointer-events: none;
  animation: glowdrift 15s ease-in-out infinite;
}
.page-head h1 {
  position: relative;
  font-family: var(--font-head); font-weight: 600;
  font-size: clamp(30px, 4.5vw, 40px); line-height: 1.08; letter-spacing: -.015em;
  margin: 0 0 14px;
}
.page-head .lead {
  position: relative;
  font-size: 17px; line-height: 1.6; color: var(--text-soft);
  margin: 0; max-width: 46rem;
}

/* ============================================================
   5. POST LIST
   ============================================================ */
.content { padding-block: 8px 32px; }
.post-list { max-width: 44rem; margin-inline: auto; display: flex; flex-direction: column; gap: 26px; }
.post-title { font-family: var(--font-head); font-weight: 600; font-size: 20px; margin: 0 0 4px; }
.post-title a { color: var(--text); text-decoration: none; }
.post-title a:hover { color: var(--link); text-decoration: underline; text-underline-offset: 3px; }
.post-date {
  display: block; margin: 0 0 3px;
  font-family: var(--font-mono); font-size: 12px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text-soft);
}
.post-desc { margin: 0; font-size: 14.5px; color: var(--text-soft); }

/* ============================================================
   6. FOOTER
   ============================================================ */
.footer { margin-top: 32px; border-top: 1px solid var(--border); }
.footer-inner {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; flex-wrap: wrap; padding-block: 34px 40px;
}
.footer-label {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--text-soft); margin-bottom: 14px;
}
.footer-links { display: flex; gap: 22px; flex-wrap: wrap; }
.footer-links a { font-size: 14px; color: var(--link); text-decoration: none; }
.footer-links a:hover { text-decoration: underline; }
.footer-copy {
  font-family: var(--font-mono); font-size: 11.5px; letter-spacing: .04em;
  color: var(--text-soft); text-align: right;
}

/* ============================================================
   7. RESPONSIVE
   ============================================================ */
@media (max-width: 720px) {
  .topbar-inner { padding: 16px 20px; }
  .nav { gap: 16px; }
  .nav-divider { display: none; }
  .wrap { padding-inline: 20px; }
  .page-head { padding: 28px 20px 20px; }
  .footer-inner { flex-direction: column; align-items: flex-start; }
  .footer-copy { text-align: left; }
}
</style>
</head>
<body>
<a class="skip-link" href="#writings">Skip to content</a>

<header class="topbar">
  <div class="topbar-inner">
    <a class="wordmark" href="/">Sandeep Sharma</a>
    <nav class="nav" aria-label="Main">
      <a href="/#work">Work</a>
      <a href="/writings" aria-current="page">Writings</a>
      <a href="/principles">Principles</a>
      <a href="/influences">Influences</a>
      <a href="/about">About</a>
      <span class="nav-divider" aria-hidden="true"></span>
      <button class="theme-toggle" id="themeToggle" type="button">Dark</button>
    </nav>
  </div>
</header>

<main>
  <!-- Page header -->
  <section class="page-head">
    <div class="glow" aria-hidden="true"></div>
    <h1>My Writings</h1>
    <p class="lead">Essays, notes, and the occasional talk.</p>
  </section>

  <!-- Posts -->
  <section class="content wrap" id="writings" aria-label="Writings">
    <div class="post-list">
      <article class="post">
        <h2 class="post-title"><a href="/writings/confidently-wrong">Confidently Wrong</a></h2>
        <span class="post-date">12 Oct 2025</span>
        <p class="post-desc">My thoughts on opinions, unknowns and confidence.</p>
      </article>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="wrap footer-inner">
    <div>
      <div class="footer-label">Elsewhere</div>
      <div class="footer-links">
        <a href="mailto:email@gosandeep.com">Email</a>
        <a href="https://www.linkedin.com/in/gosandeepsharma/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/gosandeepsharma" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
    <div class="footer-copy">© 2026 Sandeep Sharma<br />gosandeep.com</div>
  </div>
</footer>

<script>
(function () {
  var btn = document.getElementById('themeToggle');
  function apply(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    btn.textContent = theme === 'dark' ? 'Light' : 'Dark';
    btn.setAttribute('aria-label', 'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' theme');
    try { localStorage.setItem('theme', theme); } catch (e) {}
  }
  btn.addEventListener('click', function () {
    var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    apply(current === 'dark' ? 'light' : 'dark');
  });
  var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  btn.textContent = t === 'dark' ? 'Light' : 'Dark';
  btn.setAttribute('aria-label', 'Switch to ' + (t === 'dark' ? 'light' : 'dark') + ' theme');
})();
</script>
</body>
</html>
